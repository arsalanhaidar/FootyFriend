version: "3.1"

intents:
  - GetInfo
  - greet
  - goodbye
  - sassy
  - backtrack


entities:
  - team
  - lastOpponent
  - lastScore
  - leaguePosition
  - manager
  - nextGameDate
  - nextOpponent
  - numGamesPlayed
  - playingNow
  - winLossRecord


slots:
  team:
    type: text
    mappings:
      - type: from_entity
        entity: team

  lastOpponent:
    type: bool
    mappings:
      - type: from_entity
        entity: lastOpponent

  lastScore:
    type: bool
    mappings:
      - type: from_entity
        entity: lastScore

  leaguePosition:
    type: bool
    mappings:
      - type: from_entity
        entity: leaguePosition

  manager:
    type: bool
    mappings:
      - type: from_entity
        entity: manager

  nextGameDate:
    type: bool
    mappings:
      - type: from_entity
        entity: nextGameDate

  nextOpponent:
    type: bool
    mappings:
      - type: from_entity
        entity: nextOpponent

  numGamesPlayed:
    type: bool
    mappings:
      - type: from_entity
        entity: numGamesPlayed

  playingNow:
    type: bool
    mappings:
      - type: from_entity
        entity: playingNow

  winLossRecord:
    type: bool
    mappings:
      - type: from_entity
        entity: winLossRecord


responses:

  utter_greet:
    - text: "Hey, there!"
    - text: "Hello hello hello!"
    - text: "Hi, what's up?"
    - text: "Hello, how can I help today?"
    - text: "What's up squirrel friend"
    - text: "Howdy do!"

  utter_goodbye:
    - text: "See you later"
    - text: "Catch you on the flip side!"
    - text: "Goodbye"
    - text: "See ya later alligator!"
    - text: "See you soon"
    - text: "(Baby) Bye Bye Bye"

  utter_sassy:
    - text: "Mind your business, diva"
    - text: "Let's focus on the football, shall we"
    - text: "OMG you're so obsessed with meeee"
    - text: "Girl, this isn't about me now"
    - text: "Let me stay mysterious!"

  utter_missing_team:
    - text: "I'm unsure which team you're asking about, can you clarify?"
    - text: "I'm not a mindreader! Which team were you wanting to know about?"
    - text: "Remind me again, which team were you asking about?"
    - text: "I think I'm missing which team you were asking about, remind me again please!"

  utter_missing_stat:
    - text: "What specific statistic were you wanting to know about?"
    - text: "I'm not sure which statistic you would like to know, remind me again please"
    - text: "Remind me again, what would you like to know about this team?"
    - text: "My memory's real bad! Remind me what statistics you would like to know again"

  utter_team_not_found:
    - text: "I don't know this team! Maybe try a different name for them?"
    - text: "Wow, that's a new nickname! Can you ask about this team using a different name for them instead?"
    - text: "Correct me if I'm wrong, but I don't have this team in my database!"

  utter_backtrack:
    - text: "Sure thing! What do you want to know instead?"
    - text: "That's all good! What would you like to know instead?"
    - text: "Okayyy topic change I see you! So, what next?"
    - text: "No prob bob! What would you like to know instead?"

  utter_vague_question:
    - text: "That question was a little too vague for me, can you clarify?"
    - text: "League position? Last match? Previous Score? You need to specify more girl"
    - text: "I'm not a magician, you'll need to be more specific with me"
    - text: "Please can you specify exactly what you'd like to know?"


actions:
  - action_getInfo

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true
