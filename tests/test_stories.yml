#### This file contains tests to evaluate that your bot behaves as expected.
#### If you want to learn more, please see the docs: https://rasa.com/docs/rasa/testing-your-assistant

stories:

- story: say greeting
  steps:
  - user: |
      hello!
    intent: greet
  - action: utter_greet

- story: act sassy
  steps:
  - user: |
      Are you real?
    intent: sassy
  - action: utter_sassy

- story: get football information
  steps:
  - user: |
      How are Everton doing right now?
    intent: GetInfo
  - action: action_getInfo

- story: say goodbye
  steps:
  - user: |
      bye-bye!
    intent: goodbye
  - action: utter_goodbye

