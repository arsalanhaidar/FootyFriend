version: "3.1"

nlu:
- intent: GetInfo
  examples: |
    - I need to know [the record](winLossRecord) of [Manchester City](team)
    - How is [Bournemouth](team) [doing](winLossRecord)
    - How many games has [Manchester United](team) [won](winLossRecord)
    - How many games has [Arsenal](team) [lost](winLossRecord)
    - Did [Brentford](team) [draw](winLossRecord) [yesterday](lastScore)
    - Are [Liverpool](team) [doing well](winLossRecord)
    - Are [Brighton and Hove Albion](team) [playing right now](playingNow)
    - Is there a [game on](playingNow) right now?
    - Who is [playing today](playingNow)
    - Who did [Fulham](team) [play last](lastOpponent)
    - I'm wondering in [West Ham United](team)'s last game [who did they play](lastOpponent)? What was the [final score](lastScore)?
    - Which team did [Everton](team) [play](lastOpponent)
    - Who did [Sunderland](team) [play against](lastOpponent)
    - Who was [Sunderland](team)'s [previous competitor](lastOpponent)
    - What [was the score](lastScore) in [Sunderland](team)'s last game
    - How did [Everton](team) do in their [previous game](lastScore)
    - Who won in [Arsenal](team)'s [last game](lastScore)?
    - What was [the score](lastScore)
    - Who is [Arsenal](team)'s [manager](manager)
    - Who is [the manager](manager) for [Aston Villa](team)
    - Who is the [current manager](manager) for [West Ham United](team)
    - Who is [in charge](manager) for [Arsenal](team)
    - Who [leads](manager) [Brighton and Hove Albion](team) 
    - I'm looking for information about the soccer team called [Burnley](team)
    - What do you know about [Chelsea](team)
    - Tell me about [Everton](team)
    - I don't really know much about [Crystal Palace](team)
    - How many games has [West Ham United](team) [played so far](numGamesPlayed)
    - What is [Burnley](team)'s [match count](numGamesPlayed)
    - Who will [Burnley](team) [play against next match](nextOpponent)
    - Who are [Brentford](team) [playing next](nextOpponent)? Let me rephrase that. Who are they playing now?
    - Who's [up against](nextOpponent) [Tottenham Hotspur](team)
    - What's [Manchester United](team)'s [next match](nextOpponent)
    - What [place](leaguePosition) are [Crystal Palace](team) in
    - Where is [Arsenal](team) on [the tables](leaguePosition)
    - How is [Fulham](team) doing in [the league](leaguePosition)
    - What [position](leaguePosition) is [Liverpool](team) in
    - When are [Arsenal](team) [next playing](nextGameDate)
    - Are [Everton](team) [playing tomorrow](nextGameDate)
    - Is [Burnley](team) [still playing](nextGameDate) this season
    - When is [Chelsea](team)'s [next game](nextGameDate)


